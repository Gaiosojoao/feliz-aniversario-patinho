<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Aniversário Patinho </title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f8e002, #f8e002, #f8e002);
            font-family: 'Comic Sans MS', cursive, serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        h1 {
            font-size: clamp(2rem, 6vw, 4rem);
            color: #070404;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.2);
            text-align: center;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }

        .mensagem {
            max-width: 600px;
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 30px;
            margin: 30px 0;
            color: #070404;
            font-size: 1.15rem;
            line-height: 1.8;
            text-align: center;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.15);
        }

        /* Galeria */
        .galeria {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            max-width: 900px;
            width: 100%;
            margin-bottom: 30px;
        }

        .galeria img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 16px;
            border: 4px solid rgba(255, 220, 0, 0.7);
            box-shadow: 0 4px 20px rgba(200, 160, 0, 0.3);
            transition: transform 0.3s;
        }

        .galeria img:hover { transform: scale(1.05); }

        .patinho {
            font-size: 2rem;
            animation: float 3s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Patinhos flutuantes */
        .hearts-bg span {
            position: fixed;
            font-size: 1.5rem;
            animation: rise linear infinite;
            opacity: 0;
            pointer-events: none;
        }

        @keyframes rise {
            0%   { bottom: -10%; opacity: 1; }
            100% { bottom: 110%; opacity: 0; }
        }
    </style>
</head>
<body>

<div class="hearts-bg" id="hearts"></div>

<span class="patinho">🐥</span>
<h1>Feliz Aniversário Patinho!</h1>
<span class="patinho">🎂</span>

<div class="mensagem">
    <!-- ✏️ Edite a mensagem aqui -->
    Hoje é um dia muito especial, assim como você é especial para mim.<br><br>
</div>

<div class="galeria">
    <!-- ✏️ Adicione suas fotos aqui -->
    <img src="fotos/foto0.jpg" alt="foto 0">
</div>

<script>
    const bg = document.getElementById('hearts');
    for (let i = 0; i < 15; i++) {
        const s = document.createElement('span');
        s.textContent = ['🐥','🐤','🦆','🌻'][Math.floor(Math.random()*4)];
        s.style.left = Math.random() * 100 + 'vw';
        s.style.animationDuration = (4 + Math.random() * 6) + 's';
        s.style.animationDelay = (Math.random() * 8) + 's';
        bg.appendChild(s);
    }
</script>
</body>
</html>
