<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Aniversário Patinho </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f8e002, #f8e002, #f8e002);
            font-family: 'Nunito', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        h1 {
            font-size: clamp(2rem, 6vw, 4rem);
            color: #070404;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.2);
            text-align: center;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }

        .mensagem {
            max-width: 600px;
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 30px;
            margin: 30px 0;
            color: #070404;
            font-size: 1.15rem;
            line-height: 1.8;
            text-align: center;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.15);
        }

        /* Galeria */
        .galeria {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-auto-rows: 260px;
            gap: 12px;
            max-width: 960px;
            width: 100%;
            margin-bottom: 30px;
        }

        .galeria .foto-wrap {
            border-radius: 16px;
            overflow: hidden;
            background: #f8e002;
            box-shadow: 0 8px 24px rgba(0,0,0,0.18);
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .galeria .foto-wrap:hover {
            transform: scale(1.04);
            box-shadow: 0 12px 32px rgba(0,0,0,0.28);
        }

        .galeria .foto-wrap:first-child {
            grid-column: span 2;
            grid-row: span 2;
        }

        .galeria img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 0;
            border: none;
            box-shadow: none;
            transition: none;
        }

        .galeria img:hover {
            transform: scale(1.04);
            box-shadow: 0 12px 32px rgba(0,0,0,0.28);
        }

        .galeria img:first-child {
            grid-column: span 2;
            grid-row: span 2;
        }

        .patinho {
            font-size: 2rem;
            animation: float 3s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Patinhos flutuantes */
        .hearts-bg span {
            position: fixed;
            font-size: 2.5rem;
            animation: rise linear infinite;
            opacity: 0;
            pointer-events: none;
        }

        @keyframes rise {
            0%   { bottom: -10%; opacity: 1; }
            100% { bottom: 110%; opacity: 0; }
        }
    </style>
</head>
<body>

<div class="hearts-bg" id="hearts"></div>

<span class="patinho">🐥</span>
<h1>Feliz Aniversário Patinho!</h1>
<span class="patinho">🎂</span>

<div class="mensagem">
    Feliz aniversário, meu patinho!! <br><br>
    Que Deus te abençoe hoje e sempre, muita saúde, paz, amor e sucesso! <br><br>
    Que tenhamos muitos jogos de tenis pra você apanhar bastante e rir muito! E muitas noites de jogos e bebidas <br><br>
    Apesar de sempre dar uma surra você mora no coração. <br><br>
</div>

<div class="galeria">
    <!-- ✏️ Adicione suas fotos aqui -->
    <div class="foto-wrap"><img src="fotos/pato.jpg" alt="foto 0"></div>
    <div class="foto-wrap"><img src="fotos/fotoma.jpg" alt="foto 1"></div>
    <div class="foto-wrap"><img src="fotos/fotoma2.jpg" alt="foto 2"></div>
    <div class="foto-wrap"><img src="fotos/fotoaima.jpg" alt="foto 3"></div>
    <div class="foto-wrap"><img src="fotos/fotoaimacansado.jpg" alt="foto 4"></div>
    <div class="foto-wrap"><img src="fotos/fotoaimajogando.jpg" alt="foto 5"></div>
    
</div>

<script>
    const bg = document.getElementById('hearts');
    for (let i = 0; i < 15; i++) {
        const s = document.createElement('span');
        s.textContent = ['🐥','🐤','🦆','🎾','🏸'][Math.floor(Math.random()*5)];
        s.style.left = Math.random() * 100 + 'vw';
        s.style.animationDuration = (4 + Math.random() * 6) + 's';
        s.style.animationDelay = (Math.random() * 8) + 's';
        bg.appendChild(s);
    }
</script>
</body>
</html>
